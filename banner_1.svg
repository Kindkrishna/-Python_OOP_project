<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E6D8"/>
      <stop offset="100%" stop-color="#E8D5C4"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#4A3328" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- scattered coffee bean motif, left -->
  <g fill="#C1694F" opacity="0.18">
    <ellipse cx="90" cy="70" rx="22" ry="14" transform="rotate(-30 90 70)"/>
    <ellipse cx="150" cy="140" rx="22" ry="14" transform="rotate(20 150 140)"/>
    <ellipse cx="70" cy="220" rx="22" ry="14" transform="rotate(-10 70 220)"/>
    <ellipse cx="170" cy="300" rx="22" ry="14" transform="rotate(35 170 300)"/>
    <ellipse cx="60" cy="350" rx="22" ry="14" transform="rotate(-25 60 350)"/>
  </g>
  <!-- bean center lines -->
  <g stroke="#A6543C" stroke-width="2.5" opacity="0.25" fill="none">
    <path d="M 78 76 Q 90 70 102 64" transform="rotate(-30 90 70)"/>
    <path d="M 138 146 Q 150 140 162 134" transform="rotate(20 150 140)"/>
    <path d="M 58 226 Q 70 220 82 214" transform="rotate(-10 70 220)"/>
    <path d="M 158 306 Q 170 300 182 294" transform="rotate(35 170 300)"/>
    <path d="M 48 356 Q 60 350 72 344" transform="rotate(-25 60 350)"/>
  </g>

  <!-- scattered coffee bean motif, right -->
  <g fill="#C1694F" opacity="0.18">
    <ellipse cx="1110" cy="60" rx="22" ry="14" transform="rotate(15 1110 60)"/>
    <ellipse cx="1050" cy="150" rx="22" ry="14" transform="rotate(-25 1050 150)"/>
    <ellipse cx="1130" cy="240" rx="22" ry="14" transform="rotate(10 1130 240)"/>
    <ellipse cx="1040" cy="330" rx="22" ry="14" transform="rotate(-15 1040 330)"/>
    <ellipse cx="1140" cy="360" rx="22" ry="14" transform="rotate(30 1140 360)"/>
  </g>
  <g stroke="#A6543C" stroke-width="2.5" opacity="0.25" fill="none">
    <path d="M 1098 66 Q 1110 60 1122 54" transform="rotate(15 1110 60)"/>
    <path d="M 1038 156 Q 1050 150 1062 144" transform="rotate(-25 1050 150)"/>
    <path d="M 1118 246 Q 1130 240 1142 234" transform="rotate(10 1130 240)"/>
    <path d="M 1028 336 Q 1040 330 1052 324" transform="rotate(-15 1040 330)"/>
    <path d="M 1128 366 Q 1140 360 1152 354" transform="rotate(30 1140 360)"/>
  </g>

  <!-- receipt paper -->
  <g filter="url(#soft-shadow)">
    <path d="
      M 330 20
      H 870
      V 350
      L 855 365 L 840 350 L 825 365 L 810 350 L 795 365 L 780 350 L 765 365 L 750 350
      L 735 365 L 720 350 L 705 365 L 690 350 L 675 365 L 660 350 L 645 365 L 630 350
      L 615 365 L 600 350 L 585 365 L 570 350 L 555 365 L 540 350 L 525 365 L 510 350
      L 495 365 L 480 350 L 465 365 L 450 350 L 435 365 L 420 350 L 405 365 L 390 350
      L 375 365 L 360 350 L 345 365 L 330 350
      Z" fill="#FFFDF7"/>
  </g>

  <!-- receipt content -->
  <g text-anchor="middle">
    <text x="600" y="62" font-size="15" letter-spacing="6" fill="#A6543C" font-family="'Courier New', monospace">★ THE PYTHON CAFÉ ★</text>

    <text x="600" y="105" font-size="34" font-weight="700" fill="#4A3328" letter-spacing="1">Coffee Shop Billing System</text>

    <text x="600" y="135" font-size="15" fill="#8C7B6B" font-family="'Courier New', monospace" letter-spacing="2">A Python OOP Project</text>

    <!-- dashed divider -->
    <line x1="365" y1="160" x2="835" y2="160" stroke="#D9C7B5" stroke-width="2" stroke-dasharray="6 6"/>

    <!-- order lines -->
    <g font-family="'Courier New', monospace" font-size="17" fill="#4A3328">
      <text x="365" y="195" text-anchor="start">Alex   Coffee + Cookie</text>
      <text x="835" y="195" text-anchor="end">₹ 80.00</text>

      <text x="365" y="225" text-anchor="start">Bob    Cookie</text>
      <text x="835" y="225" text-anchor="end">₹ 30.00</text>

      <text x="365" y="255" text-anchor="start" fill="#A6543C">Alex   + Coffee (refill)</text>
      <text x="835" y="255" text-anchor="end" fill="#A6543C">₹ 50.00</text>
    </g>

    <!-- dashed divider -->
    <line x1="365" y1="278" x2="835" y2="278" stroke="#D9C7B5" stroke-width="2" stroke-dasharray="6 6"/>

    <!-- total -->
    <g font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#4A3328">
      <text x="365" y="312" text-anchor="start">TOTAL</text>
      <text x="835" y="312" text-anchor="end">₹ 160.00</text>
    </g>
  </g>

  <!-- stamp -->
  <g transform="translate(760,60) rotate(-18)">
    <circle r="38" fill="none" stroke="#7C9970" stroke-width="3"/>
    <circle r="32" fill="none" stroke="#7C9970" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" font-size="13" font-weight="700" fill="#7C9970" font-family="'Courier New', monospace" letter-spacing="2">OOP</text>
    <text x="0" y="14" text-anchor="middle" font-size="10" fill="#7C9970" font-family="'Courier New', monospace" letter-spacing="1">EDITION</text>
  </g>
</svg>
